async function go(){var err=document.getElementById("err");var pw=(document.getElementById("pw").value||"").trim();if(!pw)return;
 if(!(window.crypto&&window.crypto.subtle)){err.textContent="Please open this in Chrome, Edge or Safari.";return;}
 try{var e=new TextEncoder();var bk=await crypto.subtle.importKey("raw",e.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
 var k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b(ENC.salt),iterations:ENC.iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);
 var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b(ENC.iv)},k,b(ENC.ct));
 document.open();document.write(new TextDecoder().decode(pt));document.close();
